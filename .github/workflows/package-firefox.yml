name: Package Firefox Extension

on:
  workflow_dispatch:
    inputs:
      gecko_id:
        description: Published Firefox add-on ID
        required: false
        type: string
  push:
    tags:
      - 'v*'

concurrency:
  group: package-firefox-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Resolve release Gecko ID
        run: |
          RELEASE_GECKO_ID="${{ github.event.inputs.gecko_id || vars.FORKORFRY_GECKO_ID || secrets.FORKORFRY_GECKO_ID }}"
          if [ -z "$RELEASE_GECKO_ID" ]; then
            echo "Set workflow input gecko_id or configure FORKORFRY_GECKO_ID as a repo variable/secret before packaging release artifacts."
            exit 1
          fi
          echo "FORKORFRY_GECKO_ID=$RELEASE_GECKO_ID" >> "$GITHUB_ENV"

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Package and validate release artifacts
        run: npm run package:release

      - name: Upload unsigned Firefox XPI
        uses: actions/upload-artifact@v4
        with:
          name: forkorfry-firefox-xpi
          path: extension/dist/forkorfry-firefox-mv3.xpi
          if-no-files-found: error

      - name: Upload source bundle
        uses: actions/upload-artifact@v4
        with:
          name: forkorfry-source-bundle
          path: extension/dist/forkorfry-source-bundle.zip
          if-no-files-found: error
