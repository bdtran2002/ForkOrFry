name: Package Firefox Extension

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: package-firefox-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Package unsigned Firefox XPI
        run: npm run package:firefox

      - name: Package source bundle
        run: npm run package:source-bundle

      - name: Upload unsigned Firefox XPI
        uses: actions/upload-artifact@v4
        with:
          name: forkorfry-firefox-xpi
          path: extension/dist/forkorfry-firefox-mv3.xpi
          if-no-files-found: error

      - name: Upload source bundle
        uses: actions/upload-artifact@v4
        with:
          name: forkorfry-source-bundle
          path: extension/dist/forkorfry-source-bundle.zip
          if-no-files-found: error
